
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.app { display: flex; gap: 0; min-height: 600px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }

.sidebar { width: 220px; flex-shrink: 0; border-right: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); padding: 12px 8px; overflow-y: auto; }
.sidebar-title { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 8px 8px; }

.tree-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--color-text-secondary); transition: background 0.15s; user-select: none; }
.tree-item:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.tree-item.active { background: var(--color-background-primary); color: var(--color-text-primary); font-weight: 500; }
.tree-item .icon { font-size: 13px; flex-shrink: 0; }
.tree-section { font-size: 10px; color: var(--color-text-tertiary); padding: 10px 8px 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.tree-indent { padding-left: 20px; }

.content { flex: 1; padding: 24px 28px; overflow-y: auto; min-width: 0; }
.content-header { margin-bottom: 20px; }
.file-path { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); background: var(--color-background-secondary); display: inline-block; padding: 3px 8px; border-radius: 4px; margin-bottom: 8px; }
.file-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.file-subtitle { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }

.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; margin: 20px 0 8px; }

.feature-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 16px; }
.feature-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.feature-card .fc-label { font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
.feature-card .fc-desc { font-size: 11px; color: var(--color-text-secondary); line-height: 1.45; }

.dep-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.dep-pill { font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); background: var(--color-background-secondary); }
.dep-pill.core { border-color: var(--color-border-info); color: var(--color-text-info); background: var(--color-background-info); }

.code-block { font-family: var(--font-mono); font-size: 11px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px 14px; line-height: 1.7; color: var(--color-text-secondary); margin-bottom: 12px; white-space: pre; overflow-x: auto; }

.flow-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.flow-node { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; }
.flow-node.highlight { border-color: var(--color-border-info); color: var(--color-text-info); background: var(--color-background-info); }
.flow-arr { color: var(--color-text-tertiary); font-size: 14px; }

.hook-feature { display: flex; gap: 10px; padding: 8px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); margin-bottom: 6px; background: var(--color-background-primary); }
.hook-name { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--color-text-info); min-width: 100px; flex-shrink: 0; }
.hook-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.4; }

.page-map { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.page-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px; background: var(--color-background-primary); }
.page-card .route { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-tertiary); margin-bottom: 4px; }
.page-card .pname { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.page-card .pdesc { font-size: 11px; color: var(--color-text-secondary); line-height: 1.45; }

.overview-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.ov-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px; background: var(--color-background-primary); text-align: center; }
.ov-num { font-size: 24px; font-weight: 500; color: var(--color-text-primary); }
.ov-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

.tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; margin-right: 4px; }
.tag-green { background: var(--color-background-success); color: var(--color-text-success); }
.tag-blue { background: var(--color-background-info); color: var(--color-text-info); }
.tag-warn { background: var(--color-background-warning); color: var(--color-text-warning); }

.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 16px 0; }

.nav-footer { display: flex; gap: 8px; margin-top: 24px; padding-top: 16px; border-top: 0.5px solid var(--color-border-tertiary); }
.nav-btn { font-size: 11px; padding: 6px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); cursor: pointer; background: var(--color-background-secondary); color: var(--color-text-secondary); transition: background 0.15s; }
.nav-btn:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.nav-btn.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.nav-btn.primary:hover { opacity: 0.85; }
</style>

<script>
const TABS = {
  overview: {
    path: 'nexus-dashboard/',
    title: 'Project Overview',
    subtitle: 'A full-stack React application built as a universal hackathon scaffold. Every part of it — the landing page, dashboard, CRUD system, and analytics — is wired together and ready to rebrand in minutes.',
    render: () => `
      <div class="overview-grid">
        <div class="ov-card"><div class="ov-num">20</div><div class="ov-label">Source files</div></div>
        <div class="ov-card"><div class="ov-num">6</div><div class="ov-label">Pages</div></div>
        <div class="ov-card"><div class="ov-num">7</div><div class="ov-label">Components</div></div>
      </div>
      <div class="section-label">Tech stack</div>
      <div class="dep-list">
        <span class="dep-pill core">React 18</span>
        <span class="dep-pill core">Vite</span>
        <span class="dep-pill core">Tailwind CSS</span>
        <span class="dep-pill">Framer Motion</span>
        <span class="dep-pill">Three.js</span>
        <span class="dep-pill">@react-three/fiber</span>
        <span class="dep-pill">Recharts</span>
        <span class="dep-pill">React Router v6</span>
        <span class="dep-pill">Lucide Icons</span>
        <span class="dep-pill">react-hot-toast</span>
        <span class="dep-pill">date-fns</span>
      </div>
      <div class="section-label">Folder structure</div>
      <div class="code-block">nexus-dashboard/
├── index.html             ← Google Fonts, root div
├── vite.config.js         ← Vite bundler config
├── tailwind.config.js     ← Custom tokens, dark mode
├── postcss.config.js      ← PostCSS pipeline
├── package.json           ← All 11 dependencies
└── src/
    ├── main.jsx           ← React DOM entry
    ├── App.jsx            ← Route tree
    ├── index.css          ← Global styles + Tailwind
    ├── hooks/
    │   ├── useTheme.jsx   ← Dark/light context
    │   └── useRecords.js  ← CRUD + localStorage
    ├── components/
    │   ├── DashboardLayout.jsx
    │   ├── SummaryCards.jsx
    │   ├── RecordForm.jsx
    │   ├── RecordTable.jsx
    │   ├── EditModal.jsx
    │   ├── ConfirmModal.jsx
    │   └── StatusBadge.jsx
    └── pages/
        ├── LandingPage.jsx
        ├── DashboardHome.jsx
        ├── AddRecord.jsx
        ├── ManageRecords.jsx
        ├── Analytics.jsx
        └── Settings.jsx</div>
      <div class="section-label">How it starts</div>
      <div class="flow-row">
        <div class="flow-node">index.html</div><span class="flow-arr">→</span>
        <div class="flow-node">main.jsx</div><span class="flow-arr">→</span>
        <div class="flow-node">App.jsx</div><span class="flow-arr">→</span>
        <div class="flow-node highlight">ThemeProvider wraps everything</div>
      </div>
      <div class="flow-row">
        <div class="flow-node">/</div><span class="flow-arr">→</span>
        <div class="flow-node">LandingPage</div>
        <span style="margin: 0 8px; color: var(--color-text-tertiary)">  |  </span>
        <div class="flow-node">/dashboard/*</div><span class="flow-arr">→</span>
        <div class="flow-node">DashboardLayout + child page</div>
      </div>
    `
  },

  entry: {
    path: 'src/main.jsx  ·  src/App.jsx',
    title: 'Entry point & routing',
    subtitle: 'main.jsx boots React and wraps the app in BrowserRouter. App.jsx defines every route — the landing page at / and all dashboard pages nested under /dashboard.',
    render: () => `
      <div class="section-label">main.jsx — what it does</div>
      <div class="feature-grid">
        <div class="feature-card"><div class="fc-label">ReactDOM.createRoot</div><div class="fc-desc">Mounts the app into #root in index.html</div></div>
        <div class="feature-card"><div class="fc-label">BrowserRouter</div><div class="fc-desc">Enables HTML5 history-based routing throughout the app</div></div>
        <div class="feature-card"><div class="fc-label">import './index.css'</div><div class="fc-desc">Loads Tailwind + all custom utility classes globally</div></div>
      </div>
      <div class="section-label">App.jsx — route tree</div>
      <div class="code-block">/ → LandingPage (standalone, no layout wrapper)

/dashboard           → DashboardLayout (sidebar + navbar)
  index              → DashboardHome
  add                → AddRecord
  records            → ManageRecords
  analytics          → Analytics
  settings           → Settings</div>
      <div class="section-label">Key pattern — nested routes</div>
      <div class="hook-feature">
        <div class="hook-name">&lt;Outlet /&gt;</div>
        <div class="hook-desc">DashboardLayout renders &lt;Outlet /&gt; where child pages inject. This means the sidebar and navbar render once, and only the page content swaps — no full re-mount.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">&lt;Toaster /&gt;</div>
        <div class="hook-desc">react-hot-toast sits at App root so toast notifications work on every page from a single instance.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">ThemeProvider</div>
        <div class="hook-desc">Wraps the entire app so any component can call useTheme() to read or toggle dark mode. Persists choice to localStorage.</div>
      </div>
    `
  },

  useTheme: {
    path: 'src/hooks/useTheme.jsx',
    title: 'useTheme — dark/light mode',
    subtitle: 'A React Context that stores the dark/light preference, syncs it to the HTML class and localStorage, and exposes a { dark, setDark } API to any component.',
    render: () => `
      <div class="section-label">How it works</div>
      <div class="hook-feature">
        <div class="hook-name">useState init</div>
        <div class="hook-desc">Reads 'nexus-theme' from localStorage on first render. Falls back to light if nothing is saved.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">useEffect</div>
        <div class="hook-desc">Watches the dark value. When it flips, adds/removes the 'dark' class on &lt;html&gt; — this is how Tailwind's darkMode: 'class' strategy works.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">ThemeProvider</div>
        <div class="hook-desc">Wraps the whole app in App.jsx. Any component inside can call useTheme() to get dark and setDark.</div>
      </div>
      <div class="section-label">Who uses it</div>
      <div class="dep-list">
        <span class="dep-pill">DashboardLayout (toggle button)</span>
        <span class="dep-pill">Settings (mode selector)</span>
      </div>
      <div class="section-label">Tailwind dark mode in practice</div>
      <div class="code-block">// Every Tailwind class can have a dark: prefix
className="bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
// When &lt;html class="dark"&gt; is set, dark: variants win</div>
    `
  },

  useRecords: {
    path: 'src/hooks/useRecords.js',
    title: 'useRecords — the data engine',
    subtitle: 'The entire CRUD system lives here. It manages an array of record objects in React state, syncs every change to localStorage, and seeds 10 demo records on first load.',
    render: () => `
      <div class="section-label">Data shape — one record looks like this</div>
      <div class="code-block">{ id: '1', name: 'Alice Johnson', category: 'Research',
  status: 'Active', date: '2024-01-15',
  description: 'Lead researcher on quantum project.' }</div>
      <div class="section-label">Exposed API</div>
      <div class="hook-feature">
        <div class="hook-name">records</div>
        <div class="hook-desc">The live array of all records. Components read this to render tables, cards, and charts.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">addRecord(data)</div>
        <div class="hook-desc">Generates a unique id (Date.now().toString()), merges it with the form data, and prepends to the array.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">updateRecord(id, data)</div>
        <div class="hook-desc">Maps over records, finds the matching id, and spreads the new data in — everything else stays unchanged.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">deleteRecord(id)</div>
        <div class="hook-desc">Filters out the record with the matching id. The UI re-renders instantly.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">getRecord(id)</div>
        <div class="hook-desc">Finds and returns a single record — used to populate the edit form.</div>
      </div>
      <div class="section-label">localStorage sync</div>
      <div class="code-block">// On every records state change:
useEffect(() => {
  localStorage.setItem('nexus-records', JSON.stringify(records))
}, [records])

// On first render: read saved data, or load 10 seed records
const saved = localStorage.getItem('nexus-records')
return saved ? JSON.parse(saved) : SEED_DATA</div>
      <div class="section-label">To add a new field (e.g. "priority")</div>
      <div class="code-block">1. Add 'priority' to SEED_DATA objects
2. Add 'priority' to defaultForm in RecordForm.jsx
3. Add a form input for it in RecordForm.jsx
4. Optionally show it as a column in RecordTable.jsx</div>
    `
  },

  DashboardLayout: {
    path: 'src/components/DashboardLayout.jsx',
    title: 'DashboardLayout — shell',
    subtitle: 'The persistent wrapper for all dashboard pages. Renders the sidebar, the top navbar, and an Outlet where child pages inject. The sidebar collapses to a slide-in drawer on mobile.',
    render: () => `
      <div class="section-label">Structure</div>
      <div class="flow-row">
        <div class="flow-node">Sidebar (fixed on desktop)</div>
        <span class="flow-arr">+</span>
        <div class="flow-node">Main column</div>
      </div>
      <div class="flow-row" style="padding-left:140px;">
        <div class="flow-node">Top Navbar</div>
        <span class="flow-arr">+</span>
        <div class="flow-node highlight">&lt;Outlet /&gt; ← page goes here</div>
      </div>
      <div class="section-label">Sidebar features</div>
      <div class="feature-grid">
        <div class="feature-card"><div class="fc-label">NavLink active state</div><div class="fc-desc">React Router's NavLink auto-adds the 'active' class to the current route. Tailwind styles it differently.</div></div>
        <div class="feature-card"><div class="fc-label">Mobile drawer</div><div class="fc-desc">On screens below lg, sidebar slides in/out via Framer Motion. A backdrop overlay closes it on tap.</div></div>
        <div class="feature-card"><div class="fc-label">Exit to landing</div><div class="fc-desc">LogOut button navigates to / using useNavigate(), leaving the dashboard entirely.</div></div>
      </div>
      <div class="section-label">Navbar features</div>
      <div class="feature-grid">
        <div class="feature-card"><div class="fc-label">Search bar</div><div class="fc-desc">Decorative input in the navbar — actual search logic lives in RecordTable's own state.</div></div>
        <div class="feature-card"><div class="fc-label">ThemeToggle</div><div class="fc-desc">Sun/Moon icon animates with Framer Motion AnimatePresence on switch. Calls useTheme.</div></div>
        <div class="feature-card"><div class="fc-label">Avatar</div><div class="fc-desc">Gradient circle with initials. Replace with a real auth avatar in production.</div></div>
        <div class="feature-card"><div class="fc-label">Notification dot</div><div class="fc-desc">Bell icon with a small blue dot. Purely decorative — wire to real data as needed.</div></div>
      </div>
      <div class="section-label">Page transition</div>
      <div class="hook-feature">
        <div class="hook-name">AnimatePresence</div>
        <div class="hook-desc">Wraps the Outlet. Every page fade/slides in (opacity 0→1, y 10→0) and fades out when the route changes. Uses Framer Motion's key-based re-mount detection.</div>
      </div>
    `
  },

  SummaryCards: {
    path: 'src/components/SummaryCards.jsx',
    title: 'SummaryCards — animated stats',
    subtitle: 'Renders 4 metric cards at the top of the dashboard. Each card shows a count, a label, a sub-note, and an animated progress bar. All data is computed live from the records array.',
    render: () => `
      <div class="section-label">The 4 cards</div>
      <div class="feature-grid">
        <div class="feature-card"><div class="fc-label">Total Records</div><div class="fc-desc">records.length — always the full count regardless of filters.</div></div>
        <div class="feature-card"><div class="fc-label">Active Records</div><div class="fc-desc">Filtered by status === 'Active'. Shows % of total as sub-text.</div></div>
        <div class="feature-card"><div class="fc-label">Pending Review</div><div class="fc-desc">Filtered by status === 'Pending'. Signals records needing attention.</div></div>
        <div class="feature-card"><div class="fc-label">Recent Activity</div><div class="fc-desc">First 3 records in the array (newest added, since addRecord prepends).</div></div>
      </div>
      <div class="section-label">Animation system</div>
      <div class="hook-feature">
        <div class="hook-name">cardVariants</div>
        <div class="hook-desc">Each card has a 'hidden' (opacity 0, y 20, scale 0.96) and 'visible' state. The custom prop staggers the delay by index × 0.1s — cards cascade in one by one.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">Progress bar</div>
        <div class="hook-desc">A div animated from width: 0 to width: (value/total × 100)%. Uses a gradient background matching each card's color theme.</div>
      </div>
      <div class="hook-feature">
        <div class="hook-name">whileHover</div>
        <div class="hook-desc">Cards lift 3px (y: -3) and add a box-shadow on hover — subtle but premium-feeling interaction.</div>
      </div>
    `
  },

  RecordForm: {
    path: 'src/components/RecordForm.jsx',
    title: 'RecordForm — universal form',
    subtitle: 'A reusable form with 5 fields: Name, Category (dropdown), Status (pill buttons), Date, and Description. Has full client-side validation, per-field error messages, and a character counter.',
    render: () => `
      <div class="section-label">Fields</div>
      <div class="feature-grid">
        <div class="feature-card"><div class="fc-label">Name</div><div class="fc-desc">Required, min 2 chars. Shows error only after the field is touched (blurred).</div></div>
        <div class="feature-card"><div class="fc-label">Category</div><div class="fc-desc">Native select with 8 options. Extensible — just add to the CATEGORIES array.</div></div>

let current = 'overview'

function show(id) {
  current = id
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'))
  const tab = document.getElementById('tab-' + id)
  if (tab) tab.classList.add('active')

  const data = TABS[id]
  if (!data) return

  document.getElementById('content').innerHTML = `
    <div class="content-header">
      <div class="file-path">${data.path}</div>
      <div class="file-title">${data.title}</div>
      <div class="file-subtitle">${data.subtitle}</div>
    </div>
    ${data.render()}
  `
}

show('overview')
